<!DOCTYPE html>
<html>

<head>

<title>Add Book</title>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<h1>Add New Book</h1>

<form method="POST">

<input
type="text"
name="title"
placeholder="Book Title"
required>

<br><br>

<input
type="text"
name="author"
placeholder="Author"
required>

<br><br>

<input
type="text"
name="category"
placeholder="Category"
required>

<br><br>

<input
type="number"
name="quantity"
placeholder="Quantity"
min="1"
required>

<br><br>

<button type="submit">
Add Book
</button>

</form>

<br>

<a href="/">⬅ Back to Home</a>

</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Issue Book</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-lg py-3">
    <div class="container">
        <a class="navbar-brand fw-bold fs-2" href="/">
            <i class="fa-solid fa-book-open"></i> Library Management System
        </a>
        <button class="navbar-toggler"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto align-items-center">
                <li class="nav-item mx-2">
                    <a class="nav-link fs-5 fw-semibold" href="/">
                        <i class="fa-solid fa-house"></i> Home
                    </a>
                </li>
                <li class="nav-item mx-2">
                    <a class="nav-link fs-5 fw-semibold" href="/add">
                        <i class="fa-solid fa-plus"></i> Add Book
                    </a>
                </li>
                <li class="nav-item mx-2">
                    <a class="nav-link fs-5 fw-semibold" href="/issued">
                        <i class="fa-solid fa-book"></i> Issued Books
                    </a>
                </li>
            </ul>
        </div>
    </div>
    </nav>
<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-6">

            <div class="card shadow">

                <div class="card-header bg-primary text-white text-center">
                    <h3>📚 Issue Book</h3>
                </div>

                <div class="card-body">

                    <h5 class="text-center mb-4">
                        <strong>{{ book.title }}</strong>
                    </h5>

                    <form method="POST">

                        <div class="mb-3">
                            <label class="form-label">Student Name</label>
                            <input
                                type="text"
                                name="student"
                                class="form-control"
                                placeholder="Enter Student Name"
                                required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Roll Number</label>
                            <input
                                type="text"
                                name="roll"
                                class="form-control"
                                placeholder="Enter Roll Number"
                                required>
                        </div>

                        <button type="submit" class="btn btn-success w-100">
                            Issue Book
                        </button>

                    </form>

                </div>

                <div class="card-footer text-center">

                    <a href="/" class="btn btn-secondary">
                        ← Back to Home
                    </a>

                </div>

            </div>

        </div>

    </div>

</div>

</body>

</html>

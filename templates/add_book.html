<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Book</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
    <link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-lg py-3">
    <div class="container">
        <a class="navbar-brand fw-bold fs-2" href="/">
            <i class="fa-solid fa-book-open"></i> Library Management System
        </a>
        <button class="navbar-toggler"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto align-items-center">
                <li class="nav-item mx-2">
                    <a class="nav-link fs-5 fw-semibold" href="/">
                        <i class="fa-solid fa-house"></i> Home
                    </a>
                </li>
                <li class="nav-item mx-2">
                    <a class="nav-link fs-5 fw-semibold" href="/add">
                        <i class="fa-solid fa-plus"></i> Add Book
                    </a>
                </li>
                <li class="nav-item mx-2">
                    <a class="nav-link fs-5 fw-semibold" href="/issued">
                        <i class="fa-solid fa-book"></i> Issued Books
                    </a>
                </li>
            </ul>
        </div>
    </div>
    </nav>

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-6">

            <div class="card shadow">

                <div class="card-header bg-success text-white text-center">
                    <h3>📚 Add New Book</h3>
                </div>

                <div class="card-body">

                    <form method="POST">

                        <div class="mb-3">
                            <label class="form-label">Book Title</label>
                            <input
                                type="text"
                                name="title"
                                class="form-control"
                                placeholder="Enter Book Title"
                                required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Author</label>
                            <input
                                type="text"
                                name="author"
                                class="form-control"
                                placeholder="Enter Author Name"
                                required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Category</label>
                            <input
                                type="text"
                                name="category"
                                class="form-control"
                                placeholder="Enter Category"
                                required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Quantity</label>
                            <input
                                type="number"
                                name="quantity"
                                class="form-control"
                                placeholder="Enter Quantity"
                                min="1"
                                required>
                        </div>

                        <button type="submit" class="btn btn-success w-100">
                            Add Book
                        </button>

                    </form>

                </div>

                <div class="card-footer text-center">

                    <a href="/" class="btn btn-secondary">
                        ← Back to Home
                    </a>

                </div>

            </div>

        </div>

    </div>

</div>

</body>

</html>

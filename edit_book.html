<!DOCTYPE html>
<html>

<head>

<title>Edit Book</title>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<h1>Edit Book</h1>

<form method="POST">

<input
type="text"
name="title"
value="{{ book.title }}"
required>

<br><br>

<input
type="text"
name="author"
value="{{ book.author }}"
required>

<br><br>

<input
type="text"
name="category"
value="{{ book.category }}"
required>

<br><br>

<input
type="number"
name="quantity"
value="{{ book.quantity }}"
required>

<br><br>

<button type="submit">
Update Book
</button>

</form>

<br>

<a href="/">⬅ Back</a>

</body>

</html>
